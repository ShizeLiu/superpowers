# 将本 fork 的默认分支与上游仓库同步（每小时 UTC 整点 + 可手动运行）
name: Sync fork with upstream

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

env:
  UPSTREAM_OWNER: obra
  UPSTREAM_REPO: superpowers

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出当前 fork（完整历史，便于合并）
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 合并上游默认分支到本仓库默认分支
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "daxiong"
          git config user.email "15732029980@163.com"

          UPSTREAM_DEFAULT="$(gh api "repos/${UPSTREAM_OWNER}/${UPSTREAM_REPO}" --jq .default_branch)"
          FORK_DEFAULT="$(gh api "repos/${GITHUB_REPOSITORY}" --jq .default_branch)"

          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "https://github.com/${UPSTREAM_OWNER}/${UPSTREAM_REPO}.git"
          else
            git remote add upstream "https://github.com/${UPSTREAM_OWNER}/${UPSTREAM_REPO}.git"
          fi
          git fetch upstream --prune

          git checkout "$FORK_DEFAULT"
          git pull origin "$FORK_DEFAULT" --ff-only || true

          git merge "upstream/${UPSTREAM_DEFAULT}" -m "chore: merge upstream ${UPSTREAM_DEFAULT} into ${FORK_DEFAULT} [skip ci]" || {
            echo "合并失败：可能有冲突，请在本地解决后推送。"
            exit 1
          }
          git push origin "$FORK_DEFAULT"
